<!DOCTYPE html>
<html>
<head>
    <title>Links and Images Practice</title>
</head>
<body>
    <h1>My Web Page</h1>
    <a href="#about">Go to About Section</a>
    <br><br>
    <a href="https://www.google.com" target="_blank">
        Visit Google
    </a>
    <br><br>
    <img src="nature.jpg" alt="Beautiful Nature Image" width="300">
    <br><br>
    <a href="https://www.youtube.com" target="_blank">
        <img src="youtube-logo.png" alt="YouTube Logo" width="150">
    </a>
    <hr>
    <h2 id="about">About Section</h2>
    <p>
        This section is reached using the internal link at the top of the page.
    </p>
</body>
</html>
